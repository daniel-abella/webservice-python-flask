<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>::: Cauã Store :::</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="icon" href="/icon.ico" type="image/x-icon">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="page-shell">
        <div class="brand-bar">
            <img class="brand-logo" src="/logocaua.png" alt="Logo da Faculdade Caucaia">
        </div>

        <main class="dashboard">
            <section class="panel panel-wide">
                <div class="panel-header panel-header-stack">
                    <div>
                        <p class="panel-kicker">Cauã Store</p>
                        <h1>Listagem de produtos</h1>
                    </div>
                    <div class="toolbar">
                        <span id="productCount" class="count-badge">0 itens</span>
                        <button id="openCreateButton" class="primary-button icon-only-button" type="button" aria-label="Adicionar produto" title="Adicionar produto">
                            <i class="bi bi-plus-lg" aria-hidden="true"></i>
                        </button>
                    </div>
                </div>

                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nome</th>
                                <th>Preço</th>
                                <th>Quantidade</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="productsTableBody">
                            <tr>
                                <td colspan="5" class="empty-row">Carregando produtos...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div id="productsCardList" class="products-card-list">
                    <article class="product-card product-card-empty">
                        <p>Carregando produtos...</p>
                    </article>
                </div>
            </section>
        </main>
    </div>

    <div id="modalOverlay" class="modal-overlay hidden">
        <div class="modal-card">
            <div class="modal-header">
                <div>
                    <p id="modalKicker" class="panel-kicker">Cadastro</p>
                    <h2 id="modalTitle">Novo produto</h2>
                </div>
                <button id="closeModalButton" class="icon-button icon-only-button" type="button" aria-label="Fechar" title="Fechar">
                    <i class="bi bi-x-lg" aria-hidden="true"></i>
                </button>
            </div>

            <div id="viewContent" class="modal-section hidden">
                <div class="detail-grid">
                    <div class="detail-item">
                        <span>ID</span>
                        <strong id="viewId">-</strong>
                    </div>
                    <div class="detail-item">
                        <span>Nome</span>
                        <strong id="viewNome">-</strong>
                    </div>
                    <div class="detail-item">
                        <span>Preco</span>
                        <strong id="viewPreco">-</strong>
                    </div>
                    <div class="detail-item">
                        <span>Quantidade</span>
                        <strong id="viewQuantidade">-</strong>
                    </div>
                </div>
            </div>

            <form id="productForm" class="modal-section hidden">
                <input id="productId" name="id" type="hidden">
                <div class="form-grid">
                    <label>
                        Nome
                        <input id="productNome" type="text" name="nome" placeholder="Ex.: Monitor Gamer" required>
                    </label>
                    <label>
                        Preco
                        <input id="productPreco" type="number" name="preco" step="0.01" min="0" placeholder="0.00" required>
                    </label>
                    <label>
                        Quantidade
                        <input id="productQuantidade" type="number" name="quantidade" min="0" placeholder="0" required>
                    </label>
                </div>
                <div class="modal-actions">
                    <button class="ghost-button icon-only-button" type="button" data-close-modal aria-label="Cancelar" title="Cancelar">
                        <i class="bi bi-arrow-left" aria-hidden="true"></i>
                    </button>
                    <button id="saveProductButton" class="primary-button icon-only-button" type="submit" aria-label="Salvar" title="Salvar">
                        <i class="bi bi-check2" aria-hidden="true"></i>
                    </button>
                </div>
            </form>

            <div id="deleteContent" class="modal-section hidden">
                <p class="confirm-text">Tem certeza que deseja remover este produto?</p>
                <div class="detail-grid detail-grid-compact">
                    <div class="detail-item">
                        <span>ID</span>
                        <strong id="deleteId">-</strong>
                    </div>
                    <div class="detail-item">
                        <span>Nome</span>
                        <strong id="deleteNome">-</strong>
                    </div>
                </div>
                <div class="modal-actions">
                    <button class="ghost-button icon-only-button" type="button" data-close-modal aria-label="Cancelar" title="Cancelar">
                        <i class="bi bi-arrow-left" aria-hidden="true"></i>
                    </button>
                    <button id="confirmDeleteButton" class="danger-button icon-only-button" type="button" aria-label="Remover produto" title="Remover produto">
                        <i class="bi bi-trash3" aria-hidden="true"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
